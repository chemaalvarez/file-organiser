# Configuración del organizador de archivos
# ─────────────────────────────────────────
# Copia este fichero a config.yaml y personalízalo:
#   cp config.example.yaml config.yaml
#
# config.yaml está en .gitignore: tus datos nunca suben al repositorio.

# Carpeta raíz por defecto (se puede sobreescribir con --root)
root: "~/Downloads"

# Umbral de confianza para mover una carpeta en bloque (0.0 - 1.0)
confidence_threshold: 0.85

# Acción ante duplicados exactos (mismo SHA-256): skip | rename | overwrite
on_duplicate: "rename"

# Tamaño máximo de archivo para escanear contenido (MB)
max_content_scan_mb: 100

# Profundidad máxima de escaneo (0 = ilimitada)
max_depth: 0

# Motor de IA para archivos ambiguos
ai:
  enabled: false
  provider: "ollama"
  model: "llama3.2"
  max_tokens: 200

# ── Trabajo ────────────────────────────────────────────────────────────────────
# Nombres de tus empresas tal como aparecen en Trabajo/{Empresa}/
companies:
  # - MiEmpresa
  # - OtraEmpresa

# ── Personal ───────────────────────────────────────────────────────────────────
# Nombres de las personas de tu familia → clasifican a Personal/Familiar/{persona}/
family_members:
  # - persona1
  # - persona2

# Coches conocidos → clasifican a Personal/Coches/{modelo}/
# Formato recomendado: "Año Marca Modelo"
known_cars:
  # - "2024 Marca Modelo"

# Viviendas por ciudad → clasifican a Personal/Vivienda/{ciudad}/
known_homes:
  # Ciudad1:
  #   - "Dirección 1"
  # Ciudad2:
  #   - "Dirección 2"

# Palabras clave adicionales por categoría (se suman al diccionario base)
extra_keywords:
  trabajo: []
  personal_gastos: []
  personal_salud: []
  personal_vivienda: []
  personal_documentos: []

# Archivos y carpetas a ignorar siempre
ignore_patterns:
  - ".DS_Store"
  - "Thumbs.db"
  - ".localized"
  - "desktop.ini"
  - "*.tmp"
  - "*.part"
  - ".git"
  - ".ordenar"
